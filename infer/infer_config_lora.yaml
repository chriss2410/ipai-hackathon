# =============================================================================
# IPAI Hackathon - Async Inference Configuration (LoRA model)
# =============================================================================
# Usage:
#   Terminal 1: python infer/policy_server.py                        # start server
#   Terminal 2: python infer/infer_lora.py                           # start client
#   Custom:     python infer/infer_lora.py --config path/to/other.yaml

# ---- Policy Server ----
server:
  host: "127.0.0.1"
  port: 8080

# ---- Policy / Model ----
policy:
  type: "smolvla"
  pretrained_name_or_path: "chris241094/smolVLA-New-lora-v09"
  policy_device: "cpu"
  client_device: "cpu"

# ---- Robot ----
robot:
  type: "so100_follower"
  port: "/dev/ttyACM1"
  id: "follower"

# ---- Cameras ----
cameras:
  wrist:
    index_or_path: "/dev/video8"
    width: 640
    height: 480
    fps: 30
  front:
    index_or_path: "/dev/video0"
    width: 640
    height: 480
    fps: 30
  top:
    index_or_path: "/dev/video2"
    width: 640
    height: 480
    fps: 30

# ---- Task ----
task: "pick blue car"

# ---- Async Inference Parameters ----
async:
  actions_per_chunk: 50
  chunk_size_threshold: 0.5
  aggregate_fn_name: "weighted_average"
  fps: 30
  debug_visualize_queue_size: false

# =============================================================================
# Test / Mock Inference (used by test_inference.py only)
# =============================================================================
test:
  dataset: "chris241094/dataset-pickupBlue-1"
  episode: 0
  camera_map:
    wrist: "observation.images.side"
    front: "observation.images.up"
    top: "observation.images.side"
