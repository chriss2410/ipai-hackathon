# =============================================================================
# IPAI Hackathon - Inference GUI Configuration
# =============================================================================
# Usage: python infer/gui.py
#        python infer/gui.py --config path/to/other.yaml

# ---- Model ----
model:
  id: "chris241094/smolVLA-New-v07"

# ---- LoRA ----
# Set enabled: true to load a LoRA adapter on top of the base model above.
# The adapter config embeds the base model path, but model.id above takes precedence.
lora:
  enabled: true
  adapter_id: "chris241094/smolVLA-New-lora-v10"

# ---- Device ----
# Options: "cuda", "cpu", "mps", "xpu" (Intel GPU)
device: "xpu"

# ---- Robot ----
robot:
  port: "/dev/ttyACM1"
  id: "follower"

# ---- Teleop (leader arm) ----
teleop:
  port: "/dev/ttyACM0"
  id: "leader"

# ---- Cameras ----
# Keys and resolutions MUST match those used during training.
cameras:
  wrist:
    index_or_path: "/dev/video8"
    width: 640
    height: 480
    fps: 30
  front:
    index_or_path: "/dev/video0"
    width: 640
    height: 480
    fps: 30
  top:
    index_or_path: "/dev/video2"
    width: 640
    height: 480
    fps: 30

# ---- Task ----
task: "Move blue car from bodyshop to painting"
robot_type: ""

# ---- Presets ----
# Paths relative to this config file's directory.
presets:
  commands: "commands.json"
  positions: "positions.json"

# ---- GUI ----
gui_port: 7860
