# =============================================================================
# IPAI Hackathon - Async Inference Configuration
# =============================================================================
# This config drives both the PolicyServer and the RobotClient.
# Usage:
#   Terminal 1: python infer/policy_server.py                  # start server
#   Terminal 2: python infer/infer.py                          # start client
#   Custom:     python infer/infer.py --config path/to/other.yaml

# ---- Policy Server ----
# Host and port the PolicyServer listens on.
# Use "0.0.0.0" to accept connections from remote machines.
server:
  host: "127.0.0.1"
  port: 8080

# ---- Policy / Model ----
policy:
  # Policy type. Options: act, smolvla, diffusion, tdmpc, vqbet, pi0, pi05, groot
  type: "smolvla"

  # HuggingFace model ID or local checkpoint path.
  # Examples: "lerobot/smolvla_base", "chris241094/smolVLA-Test-v01"
  pretrained_name_or_path: "chris241094/smolVLA-New-v01"

  # Device for running inference on the server (cuda, mps, cpu).
  policy_device: "cpu"
  
  # Device for actions on the client side after receiving from server.
  client_device: "cpu"

# ---- Robot ----
robot:
  # Robot hardware type. Currently supported: "so100_follower", "so101_follower"
  type: "so100_follower"

  # Serial port the robot is connected to.
  # Find available ports with: lerobot-find-port
  port: "/dev/ttyACM1"

  # Robot instance ID. Must match the ID used during calibration.
  id: "follower"

# ---- Cameras ----
# Camera keys and resolutions MUST match those used during training.
# Check the model's config.json on the Hub for expected camera keys.
# Find your cameras with: lerobot-find-cameras
# Add multiple cameras if the model was trained with multiple views.
cameras:
  wrist:
    index_or_path: "/dev/video8"
    width: 640
    height: 480
    fps: 30
  front:
    index_or_path: "/dev/video0"
    width: 640
    height: 480
    fps: 30
  top:
    index_or_path: "/dev/video2"
    width: 640
    height: 480
    fps: 30

# ---- Task ----
# Natural language description of the task. Used by vision-language-action
# policies (e.g. SmolVLA). Not required for policies like ACT.
task: "pick the blue car"

# ---- Async Inference Parameters ----
async:
  # Number of actions the policy outputs per chunk. Typical range: 10-50.
  # Must be <= the policy's max actions value.
  actions_per_chunk: 50

  # When the action queue drops to this fraction of chunk size, the client
  # sends a fresh observation to the server. Value in [0, 1].
  #   ~0.0 → nearly synchronous (wait until queue exhausted)
  #   ~0.5 → balanced (default, good starting point)
  #   ~1.0 → send observation every step (high bandwidth, most adaptive)
  chunk_size_threshold: 0.5

  # Function to aggregate overlapping action chunks.
  # Options: weighted_average, latest_only, average, conservative
  aggregate_fn_name: "weighted_average"

  # Target FPS for the control loop.
  fps: 30

  # Plot action queue size at runtime for tuning async parameters.
  debug_visualize_queue_size: false

# =============================================================================
# Test / Mock Inference (used by test_inference.py only)
# =============================================================================
test:
  # HuggingFace dataset to replay through the mock robot.
  dataset: "chris241094/dataset-pickupBlue-1"
  episode: 0

  # Maps robot camera names → dataset camera keys.
  # Run `python infer/test_inference.py --show-cameras` to list available keys.
  camera_map:
    wrist: "observation.images.side"
    front: "observation.images.up"
    top: "observation.images.side"
