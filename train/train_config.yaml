# =============================================================================
# IPAI Hackathon - Training Configuration
# =============================================================================
# This YAML config is translated into `lerobot-train` CLI arguments by the
# wrapper script. All actual training is handled by lerobot's built-in pipeline.
#
# Usage:
#   python train/train.py                              # uses this file
#   python train/train.py --config path/to/other.yaml  # custom config
#   python train/train.py --resume                     # resume last checkpoint
#   python train/train.py --dry-run                    # preview command

# =============================================================================
# Core IDs — everything else is derived from these three
# =============================================================================

# HuggingFace model repo (without version). Used to derive:
#   - Hub repo:    chris241094/act-svla-so101-pickplace-v01
#   - Output dir:  outputs/train/act-svla-so101-pickplace-v01
#   - Job name:    act-svla-so101-pickplace-v01
model_id: "chris241094/smolVLA-New-lora"

# HuggingFace dataset ID in LeRobot format.
# The policy auto-adapts to the dataset's motors, actions, and cameras.
dataset_id: "chris241094/train-v4"

# Integer version number. Formatted as "-v{nn}" and appended to all output
# assets. Bump this each time you start a new training run to avoid overwriting.
version: 8

# =============================================================================
# Policy
# =============================================================================
policy:
  # Pretrained model to fine-tune from (HuggingFace repo ID or local path).
  # The model's architecture auto-determines the policy type.
  # Examples: "lerobot/smolvla_base", "outputs/train/my-model-v01/checkpoints/last/pretrained_model"
  path: "lerobot/smolvla_base"

  # PyTorch device. Options: "cuda" (NVIDIA), "mps" (Apple Silicon), "cpu" (slow).
  device: "cuda"

# =============================================================================
# Rename Map
# =============================================================================
# Maps dataset feature names → policy feature names when they don't match.
# Required when your dataset's camera names differ from the base model's.
#
# smolvla_base expects: camera1, camera2, camera3
# Your cameras:         wrist, front, top
rename_map:
  "observation.images.wrist": "observation.images.camera1"
  "observation.images.front": "observation.images.camera2"
  "observation.images.top": "observation.images.camera3"

# =============================================================================
# Hub
# =============================================================================
hub:
  # Whether to push the trained model to HuggingFace Hub after training.
  push_to_hub: true

  # Make the HuggingFace model repo private.
  private: false

  # Optional license (e.g. "mit", "apache-2.0").
  # license: "mit"

  # Optional tags (e.g. ["robotics", "act", "so100"]).
  # tags: ["robotics", "act"]

# =============================================================================
# Training Parameters
# =============================================================================
training:
  # Total gradient update steps (not epochs).
  # Typical: 5000 for quick tests, 50000-100000 for real training.
  steps: 30000

  # Samples per gradient update. Reduce if you hit CUDA OOM.
  batch_size: 64

  # Parallel data loading workers. 0 = single-process (for debugging).
  num_workers: 4

  # Print training loss every N steps.
  log_freq: 10

  # Random seed for reproducibility. Set to null to disable.
  seed: 1000

# =============================================================================
# Checkpointing
# =============================================================================
checkpointing:
  # Whether to save checkpoints during training.
  save_checkpoint: true

  # Save a checkpoint every N steps. Also saves at the end of training.
  save_freq: 5000

# =============================================================================
# Evaluation
# =============================================================================
eval:
  # Run evaluation every N steps. Set high to skip during training.
  eval_freq: 20000

  # Number of episodes per evaluation.
  n_episodes: 50

# =============================================================================
# LoRA / PEFT
# =============================================================================
# Parameter-efficient fine-tuning via LoRA. Requires: pip install lerobot[peft]
# Adapter weights are saved alongside the checkpoint and loaded automatically
# at inference time — no changes needed to infer/.
#
# target_modules: unset → LeRobot defaults (q_proj, v_proj in LM expert layers)
# full_training_modules: trained at full precision alongside the LoRA adapters
#   (state_proj, action_in_proj, action_out_proj, action_time_mlp_in/out)
peft:
  method_type: "LORA"
  r: 64

# =============================================================================
# Weights & Biases
# =============================================================================
# Requires: `wandb login` before first use.
wandb:
  # Enable wandb logging.
  enable: true

  # Wandb project name.
  project: "lerobot"

  # Optional wandb entity (team or username).
  # entity: "my-team"
