# =============================================================================
# IPAI Hackathon - Training Configuration
# =============================================================================
# Edit this file to change training parameters without modifying code.

# ---- Version ----
# Appended as "-v01" suffix to output directory and hub repo ID.
version: 1

# ---- Dataset ----
dataset:
  id: "lerobot/svla_so101_pickplace"

# ---- Model ----
model:
  # Policy type: "diffusion" (more to come)
  policy: "diffusion"

# ---- Hub ----
hub:
  repo_id: "chris241094/smolVLA-Test"
  push_to_hub: true

# ---- Output ----
output:
  directory: "outputs/train/example_svla_so101_pickplace_diffusion"

# ---- Device ----
device: "cuda"  # "cuda", "cpu", or "mps"

# ---- Training Parameters ----
training:
  steps: 5000
  learning_rate: 1.0e-4
  batch_size: 128
  num_workers: 4
  log_freq: 1
  shuffle: true
  pin_memory: true   # auto-disabled on CPU
  drop_last: true

# ---- Delta Timestamps ----
# Set to "auto" to derive from dataset features + policy config.
# Or specify manually per feature key.
delta_timestamps: auto
